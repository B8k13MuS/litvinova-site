backend:
  name: github
  repo: B8k13MuS/litvinova-site
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'ru'

publish_mode: simple

collections:
  - name: "pages"
    label: "Страницы сайта"
    files:
      - name: "index"
        label: "Главная страница"
        file: "index.html"
        fields:
          - { label: "Заголовок (title)", name: "title", widget: "string" }
          - { label: "Meta описание", name: "description", widget: "text" }

      - name: "about"
        label: "Обо мне"
        file: "about.html"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Контент", name: "body", widget: "markdown" }

      - name: "services"
        label: "Услуги"
        file: "services.html"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Контент", name: "body", widget: "markdown" }

      - name: "contacts"
        label: "Контакты"
        file: "contacts.html"
        fields:
          - { label: "Телефон", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Telegram", name: "telegram", widget: "string" }

  - name: "blog"
    label: "Статьи блога"
    folder: "blog"
    create: true
    delete: true
    extension: html
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Дата публикации", name: "date", widget: "datetime" }
      - { label: "Meta описание (SEO)", name: "description", widget: "text" }
      - { label: "Изображение", name: "image", widget: "image", required: false }
      - { label: "Теги", name: "tags", widget: "list", required: false }
      - { label: "Контент статьи", name: "body", widget: "markdown" }

  - name: "reviews"
    label: "Отзывы клиентов"
    folder: "_reviews"
    create: true
    delete: true
    extension: html
    format: frontmatter
    fields:
      - { label: "Имя клиента", name: "name", widget: "string" }
      - { label: "Дата", name: "date", widget: "datetime" }
      - { label: "Текст отзыва", name: "body", widget: "markdown" }
      - { label: "Рейтинг", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }
