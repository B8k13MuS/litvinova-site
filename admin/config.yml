backend:
  name: github
  repo: B8k13MuS/litvinova-site
  branch: main
  base_url: https://sveltia-cms-auth.pages.dev
  auth_endpoint: auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'ru'

publish_mode: simple

collections:
  - name: "index"
    label: "Главная страница"
    folder: "."
    create: false
    delete: false
    extension: html
    format: frontmatter
    files:
      - name: "index"
        label: "Главная"
        file: "index.html"
        fields:
          - { label: "Заголовок (title)", name: "title", widget: "string", default: "Надежда Литвинова — психолог · EMDR · Онлайн" }
          - { label: "Meta описание", name: "description", widget: "text" }
          - { label: "Телефон", name: "phone", widget: "string", default: "+7 (918) 505-57-15" }
          - { label: "Email", name: "email", widget: "string", default: "denas111222@gmail.com" }
          - { label: "Telegram", name: "telegram", widget: "string", default: "@nadezhda_litvinova_coach" }

  - name: "about"
    label: "Обо мне"
    folder: "."
    create: false
    delete: false
    extension: html
    format: frontmatter
    files:
      - name: "about"
        label: "Страница Обо мне"
        file: "about.html"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Имя", name: "name", widget: "string", default: "Надежда Литвинова" }
          - { label: "Специализация", name: "specialization", widget: "string" }
          - { label: "Биография", name: "bio", widget: "markdown" }

  - name: "services"
    label: "Услуги"
    folder: "."
    create: false
    delete: false
    extension: html
    format: frontmatter
    files:
      - name: "services"
        label: "Страница Услуги"
        file: "services.html"
        fields:
          - { label: "Заголовок", name: "title", widget: "string" }
          - { label: "Описание", name: "description", widget: "markdown" }

  - name: "contacts"
    label: "Контакты"
    folder: "."
    create: false
    delete: false
    extension: html
    format: frontmatter
    files:
      - name: "contacts"
        label: "Страница Контакты"
        file: "contacts.html"
        fields:
          - { label: "Телефон", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Telegram", name: "telegram", widget: "string" }
          - { label: "Адрес", name: "address", widget: "string", required: false }

  - name: "blog"
    label: "Статьи блога"
    folder: "blog"
    create: true
    delete: true
    extension: html
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Дата публикации", name: "date", widget: "datetime", date_format: "DD.MM.YYYY", time_format: false }
      - { label: "Meta описание (SEO)", name: "description", widget: "text" }
      - { label: "Ключевые слова (через запятую)", name: "keywords", widget: "string", required: false }
      - { label: "Изображение", name: "image", widget: "image", required: false }
      - { label: "Теги", name: "tags", widget: "list", required: false }
      - { label: "Контент статьи", name: "body", widget: "markdown" }

  - name: "reviews"
    label: "Отзывы клиентов"
    folder: "_reviews"
    create: true
    delete: true
    extension: html
    format: frontmatter
    fields:
      - { label: "Имя клиента", name: "name", widget: "string" }
      - { label: "Дата", name: "date", widget: "datetime", date_format: "DD.MM.YYYY", time_format: false }
      - { label: "Текст отзыва", name: "body", widget: "markdown" }
      - { label: "Рейтинг", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, default: 5 }
