media:
  input: images
  output: /images

content:
  - name: blog
    label: "Блог"
    type: collection
    path: blog
    filename: "{year}-{month}-{day}-{primary}.html"
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Заголовок поста
        type: string
        required: true
      - name: date
        label: Дата публикации
        type: date
      - name: body
        label: Текст поста
        type: rich-text

