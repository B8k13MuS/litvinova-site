# Настройка папки для медиафайлов
media:
  input: "images"          # Папка, откуда CMS берёт картинки
  output: "images"         # Папка, куда сохраняются новые загруженные фото

content:
  # --- СТРАНИЦЫ САЙТА ---
  - name: homepage
    label: "Главная страница"
    type: file
    path: "index.html"
    fields:
      - name: hero_title
        label: "Hero: Заголовок"
        type: string
      - name: hero_subtitle
        label: "Hero: Описание"
        type: text
      - name: exp_years
        label: "Опыт (лет)"
        type: string
      - name: clients_count
        label: "Количество клиентов"
        type: string
      - name: confidential_val
        label: "Конфиденциальность (%)"
        type: string

  - name: about
    label: "Обо мне"
    type: file
    path: "about.html"
    fields:
      - name: body
        label: "Содержимое страницы"
        type: rich-text

  - name: services
    label: "Услуги"
    type: file
    path: "services.html"
    fields:
      - name: body
        label: "Содержимое страницы"
        type: rich-text

  - name: pricing
    label: "Тарифы"
    type: file
    path: "pricing.html"
    fields:
      - name: body
        label: "Содержимое страницы"
        type: rich-text

  # --- БЛОГ (Коллекция статей) ---
  - name: blog
    label: "Блог"
    type: collection
    path: "blog"
    format: html
    fields:
      - name: title
        label: "Заголовок статьи"
        type: string
      - name: date
        label: "Дата публикации"
        type: date
      - name: body
        label: "Текст статьи"
        type: rich-text
