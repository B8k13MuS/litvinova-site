site:
  title: "Надежда Литвинова — Психолог"
  baseUrl: "https://litvinova-psy.ru"
  preview_url: "https://litvinova-psy.ru"

collections:
  - name: "pages"
    label: "Страницы сайта"
    files:
      - name: "home"
        label: "Главная страница"
        file: "content/home.yaml"
        fields:
          # === SEO ===
          - { name: "seo_title", label: "SEO — Заголовок страницы", type: "string" }
          - { name: "seo_desc", label: "SEO — Описание", type: "text" }
          - { name: "seo_keywords", label: "SEO — Ключевые слова", type: "string" }
          
          # === Тексты для главной ===
          - { name: "hero_title", label: "Заголовок на главной (крупный текст)", type: "string" }
          - { name: "hero_subtitle", label: "Подзаголовок под именем", type: "text" }
          - { name: "about_preview", label: "Краткий текст о себе", type: "wysiwyg" }
          - { name: "services_title", label: "Заголовок блока услуг", type: "string" }
          - { name: "services", label: "Услуги (карточки)", type: "list", fields:
              - { name: "name", label: "Название", type: "string" }
              - { name: "description", label: "Описание", type: "text" }
              - { name: "icon", label: "Иконка (можно эмодзи)", type: "string" } }
          - { name: "review_text", label: "Текст отзыва", type: "wysiwyg" }
          - { name: "review_author", label: "Автор отзыва", type: "string" }

      - name: "about"
        label: "Страница 'Обо мне'"
        file: "content/about.yaml"
        fields:
          - { name: "seo_title", label: "SEO — Заголовок", type: "string" }
          - { name: "seo_desc", label: "SEO — Описание", type: "text" }
          - { name: "title", label: "Заголовок страницы", type: "string" }
          - { name: "photo", label: "Фото (загрузите в медиа)", type: "media" }
          - { name: "bio", label: "Текст обо мне", type: "wysiwyg" }
          - { name: "education", label: "Образование", type: "wysiwyg" }
          - { name: "certificates", label: "Сертификаты", type: "list", fields:
              - { name: "image", label: "Фото сертификата", type: "media" }
              - { name: "name", label: "Название", type: "string" } }

      - name: "services"
        label: "Страница 'Услуги'"
        file: "content/services.yaml"
        fields:
          - { name: "seo_title", label: "SEO — Заголовок", type: "string" }
          - { name: "seo_desc", label: "SEO — Описание", type: "text" }
          - { name: "title", label: "Заголовок страницы", type: "string" }
          - { name: "list", label: "Список услуг", type: "list", fields:
              - { name: "name", label: "Название", type: "string" }
              - { name: "description", label: "Описание", type: "text" }
              - { name: "duration", label: "Длительность", type: "string" }
              - { name: "price", label: "Цена", type: "string" } }

      - name: "contacts"
        label: "Страница 'Контакты'"
        file: "content/contacts.yaml"
        fields:
          - { name: "seo_title", label: "SEO — Заголовок", type: "string" }
          - { name: "seo_desc", label: "SEO — Описание", type: "text" }
          - { name: "title", label: "Заголовок страницы", type: "string" }
          - { name: "phone", label: "Телефон", type: "string" }
          - { name: "email", label: "Email", type: "string" }
          - { name: "address", label: "Адрес", type: "string" }
          - { name: "whatsapp", label: "WhatsApp (ссылка)", type: "string" }
          - { name: "telegram", label: "Telegram (ссылка)", type: "string" }
          - { name: "instagram", label: "Instagram (ссылка)", type: "string" }
          - { name: "map_iframe", label: "Код карты (iframe)", type: "text" }

  - name: "blog"
    label: "Блог"
    folder: "content/blog"
    extension: "yaml"
    fields:
      - { name: "title", label: "Заголовок статьи", type: "string" }
      - { name: "date", label: "Дата", type: "date" }
      - { name: "tags", label: "Теги", type: "list", type: "string" }
      - { name: "image", label: "Превью-фото", type: "media" }
      - { name: "excerpt", label: "Краткое описание", type: "text" }
      - { name: "content", label: "Полный текст", type: "wysiwyg" }
      - { name: "draft", label: "Черновик", type: "boolean", default: false }
      - { name: "seo_title", label: "SEO — Заголовок", type: "string" }
      - { name: "seo_desc", label: "SEO — Описание", type: "string" }
