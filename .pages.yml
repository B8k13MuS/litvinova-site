media:
  input: "images"
  output: "images"

content:
  # --- СТРАНИЦЫ САЙТА ---
  - name: homepage
    label: "Главная страница"
    type: file
    path: "index.html"
    fields:
      - name: body
        label: "HTML-код"
        type: code

  - name: about
    label: "Обо мне"
    type: file
    path: "about.html"
    fields:
      - name: body
        label: "HTML-код"
        type: code

  - name: services
    label: "Услуги"
    type: file
    path: "services.html"
    fields:
      - name: body
        label: "HTML-код"
        type: code

  # --- БЛОГ (Коллекция статей) ---
  - name: blog
    label: "Блог"
    type: collection
    path: "blog"
    format: markdown
    view:
      fields: [title, date, tags]
    fields:
      - name: title
        label: "Заголовок статьи"
        type: string
      - name: date
        label: "Дата публикации"
        type: date
      - name: description
        label: "Краткое описание (для карточки)"
        type: text
      - name: tags
        label: "Теги / Категории"
        type: list
      - name: body
        label: "Текст статьи"
        type: rich-text
