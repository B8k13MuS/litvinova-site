media:
  input: images
  output: /images

content:
  - name: blog
    label: Блог
    type: collection
    path: blog
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Заголовок
        type: string
      - name: date
        label: Дата
        type: date
      - name: body
        label: Контент
        type: rich-text

  - name: images
    label: Изображения
    type: collection
    path: images
    view:
      type: gallery
