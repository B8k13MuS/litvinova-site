media:
  input: images
  output: /images

content:
  - name: blog
    label: "📝 Блог"
    type: collection
    path: blog
    filename: "{year}-{month}-{day}-{primary}.html"
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Заголовок поста
        type: string
        required: true
      - name: date
        label: Дата публикации
        type: date
      - name: body
        label: Текст поста
        type: wysiwyg

  - name: site_pages
    label: "🌐 Страницы сайта"
    type: group
    items:
      - name: homepage
        label: " Главная страница"
        type: file
        path: content/pages/index.yml
        format: yaml
        fields:
          # SEO поля
          - name: title
            label: " SEO — Заголовок страницы"
            type: string
            description: "Отображается во вкладке браузера"
          - name: description
            label: "🔍 SEO — Описание"
            type: text
            description: "Для Google и Яндекс"
          - name: keywords
            label: "🔍 SEO — Ключевые слова"
            type: string
            description: "Через запятую"

          # Hero блок
          - name: hero_title
            label: "⭐ Главный заголовок"
            type: string
            description: "Большой текст на первом экране"
          - name: hero_description
            label: "⭐ Описание под заголовком"
            type: wysiwyg
          - name: hero_cita
            label: "⭐ Текст кнопки"
            type: string
          - name: hero_cita_link
            label: "⭐ Ссылка кнопки"
            type: string
            description: "Например: contacts.html#contact-form"

          # Статистика
          - name: hero_stats
            label: " Статистика в hero"
            type: object
            list:
              collapsible:
                collapsed: false
                summary: "{number} — {label}"
            fields:
              - name: number
                label: Число/эмодзи
                type: string
              - name: label
                label: Подпись
                type: string

          # О себе (кратко)
          - name: about_preview
            label: " Текст 'О себе' (кратко)"
            type: wysiwyg
            description: "Текст будет отображаться с форматированием"

          # Услуги
          - name: issues_title
            label: " Заголовок 'С чем я работаю'"
            type: string
          - name: issues
            label: "🎯 Список проблем"
            type: object
            list:
              collapsible:
                collapsed: false
                summary: "{title}"
            fields:
              - name: title
                label: Название
                type: string
              - name: description
                label: Описание
                type: wysiwyg
              - name: icon
                label: Иконка (эмодзи)
                type: string

          # Методы работы
          - name: methods_title
            label: "🧠 Заголовок 'Как я работаю'"
            type: string
          - name: methods
            label: "🧠 Методы"
            type: object
            list:
              collapsible:
                collapsed: false
                summary: "{title}"
            fields:
              - name: title
                label: Название метода
                type: string
              - name: description
                label: Описание
                type: wysiwyg
              - name: icon
                label: Иконка (эмодзи)
                type: string

          # Процесс работы
          - name: process_title
            label: " Заголовок 'Как проходит работа'"
            type: string
          - name: process_steps
            label: "📋 Шаги работы"
            type: object
            list:
              collapsible:
                collapsed: false
                summary: "{step}"
            fields:
              - name: step
                label: Название шага
                type: string
              - name: description
                label: Описание
                type: wysiwyg
              - name: icon
                label: Иконка (эмодзи)
                type: string

          # Гарантии
          - name: safety_title
            label: "🛡️ Заголовок 'Гарантии'"
            type: string
          - name: safety_items
            label: "🛡️ Гарантии"
            type: object
            list:
              collapsible:
                collapsed: false
                summary: "{name}"
            fields:
              - name: name
                label: Заголовок
                type: string
              - name: description
                label: Описание
                type: wysiwyg
              - name: icon
                label: Иконка (эмодзи)
                type: string

          # Отзывы
          - name: review_text
            label: "💬 Текст отзыва"
            type: wysiwyg
          - name: review_author
            label: "💬 Автор отзыва"
            type: string

          # Цены
          - name: pricing_title
            label: "💰 Заголовок 'Форматы консультаций'"
            type: string
          - name: pricing_items
            label: "💰 Тарифы"
            type: object
            list:
              collapsible:
                collapsed: false
                summary: "{name}"
            fields:
              - name: name
                label: Название тарифа
                type: string
              - name: duration
                label: Длительность
                type: string
              - name: description
                label: Описание
                type: wysiwyg
              - name: price
                label: Стоимость
                type: string

          # CTA блок
          - name: cta_title
            label: "🚀 Заголовок призыва к действию"
            type: string
          - name: cta_text
            label: "🚀 Подзаголовок призыва"
            type: wysiwyg
          - name: cta_button_primary
            label: "🚀 Текст основной кнопки"
            type: string
          - name: cta_button_secondary
            label: "🚀 Текст второй кнопки"
            type: string

      - name: about_page
        label: " Обо мне"
        type: file
        path: content/pages/about.yml
        format: yaml
        fields:
          - name: title
            label: "🔍 SEO — Заголовок"
            type: string
          - name: description
            label: "🔍 SEO — Описание"
            type: text
          - name: keywords
            label: "🔍 SEO — Ключевые слова"
            type: string

          - name: header_tag
            label: "🏷️ Тег-заголовок"
            type: string
          - name: header_title
            label: "⭐ Имя и фамилия"
            type: string
          - name: header_subtitle
            label: "⭐ Подпись под именем"
            type: string

          - name: lead_text
            label: "💬 Вводный текст (о подходе)"
            type: wysiwyg

          - name: bio_paragraph_1
            label: " Биография — абзац 1"
            type: wysiwyg
          - name: bio_paragraph_2
            label: " Биография — абзац 2"
            type: wysiwyg

          - name: education_title
            label: "🎓 Заголовок раздела образования"
            type: string
          - name: education_items
            label: " Образование (список)"
            type: wysiwyg

          - name: approach_title
            label: "🧠 Заголовок раздела подхода"
            type: string
          - name: approach_text
            label: " Текст о подходе"
            type: wysiwyg

          - name: call_to_action
            label: "🚀 Текст кнопки"
            type: string
          - name: call_to_action_link
            label: "🚀 Ссылка кнопки"
            type: string

      - name: services_page
        label: "🛠️ Услуги"
        type: file
        path: content/pages/services.yml
        format: yaml
        fields:
          - name: title
            label: "🔍 SEO — Заголовок"
            type: string
          - name: description
            label: "🔍 SEO — Описание"
            type: text
          - name: keywords
            label: "🔍 SEO — Ключевые слова"
            type: string

          - name: header_tag
            label: "🏷️ Тег-заголовок"
            type: string
          - name: header_title
            label: "⭐ Заголовок страницы"
            type: string
          - name: header_subtitle
            label: "⭐ Подзаголовок"
            type: string

          - name: intro_text
            label: " Вводный текст"
            type: wysiwyg

          - name: services
            label: "📋 Список услуг"
            type: object
            list:
              collapsible:
                collapsed: false
                summary: "{title}"
            fields:
              - name: title
                label: Название услуги
                type: string
              - name: description
                label: Описание
                type: wysiwyg
              - name: duration
                label: Длительность
                type: string
              - name: price
                label: Стоимость
                type: string

          - name: how_it_works_title
            label: "📋 Заголовок 'Как проходит работа'"
            type: string
          - name: how_it_works_steps
            label: " Шаги работы"
            type: wysiwyg

          - name: cta_title
            label: "🚀 Заголовок призыва"
            type: string
          - name: cta_text
            label: "🚀 Текст призыва"
            type: wysiwyg
          - name: cta_button
            label: "🚀 Текст кнопки"
            type: string
          - name: cta_link
            label: "🚀 Ссылка кнопки"
            type: string

      - name: contact_page
        label: "📞 Контакты"
        type: file
        path: content/pages/contact.yml
        format: yaml
        fields:
          - name: title
            label: "🔍 SEO — Заголовок"
            type: string
          - name: description
            label: "🔍 SEO — Описание"
            type: text
          - name: keywords
            label: "🔍 SEO — Ключевые слова"
            type: string

          - name: header_tag
            label: "🏷️ Тег-заголовок"
            type: string
          - name: header_title
            label: "⭐ Заголовок страницы"
            type: string
          - name: header_subtitle
            label: "⭐ Подзаголовок"
            type: string

          - name: contact_info_title
            label: "📞 Заголовок контактов"
            type: string
          - name: phone
            label: "📞 Телефон"
            type: string
          - name: email
            label: "✉️ Email"
            type: string
          - name: location
            label: "📍 Локация"
            type: string

          - name: telegram_label
            label: "💬 Подпись Telegram"
            type: string
          - name: telegram_link
            label: "💬 Ссылка Telegram"
            type: string
          - name: channel_label
            label: "💬 Подпись Канал"
            type: string
          - name: channel_link
            label: "💬 Ссылка Канал"
            type: string
          - name: whatsapp_label
            label: "💬 Подпись WhatsApp"
            type: string
          - name: whatsapp_link
            label: "💬 Ссылка WhatsApp"
            type: string
          - name: email_label
            label: "💬 Подпись Email"
            type: string
          - name: email_link
            label: "💬 Ссылка Email"
            type: string

          - name: form_title
            label: "📝 Заголовок формы"
            type: string
          - name: form_description
            label: "📝 Описание формы"
            type: wysiwyg
          - name: form_submit_button
            label: " Текст кнопки отправки"
            type: string
          - name: form_privacy_text
            label: "📝 Текст о конфиденциальности"
            type: string
          - name: response_time
            label: "⏱️ Время ответа"
            type: string

          - name: footer_text
            label: "📄 Текст в подвале"
            type: string
