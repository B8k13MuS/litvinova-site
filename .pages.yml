media:
  input: images
  output: /images

content:
  - name: home
    label: "Главная страница"
    type: file
    path: content/pages/index.yml
    fields:
      - name: seo_title
        label: "SEO: Заголовок страницы"
        type: string
      - name: seo_description
        label: "SEO: Описание"
        type: text
      - name: hero_title
        label: "Hero: Главный заголовок"
        type: rich-text
        description: "Используйте <br> или <em> для форматирования"
      - name: hero_description
        label: "Hero: Описание"
        type: rich-text
      - name: hero_cta
        label: "Hero: Текст кнопки"
        type: string
      - name: issues_title
        label: "Issues: Заголовок"
        type: string
      - name: issues_list
        label: "Issues: Список проблем"
        type: object
        list: true
        fields:
          - name: title
            label: "Название"
            type: string
          - name: description
            label: "Описание"
            type: text
      - name: about_title
        label: "About: Заголовок"
        type: string
      - name: methods_title
        label: "Methods: Заголовок"
        type: string
      - name: methods_list
        label: "Methods: Список методов"
        type: object
        list: true
        fields:
          - name: title
            label: "Название"
            type: string
          - name: description
            label: "Описание"
            type: text
      - name: process_title
        label: "Process: Заголовок"
        type: string
      - name: process_list
        label: "Process: Список шагов"
        type: object
        list: true
        fields:
          - name: title
            label: "Название"
            type: string
          - name: description
            label: "Описание"
            type: text
      - name: trust_title
        label: "Trust: Заголовок"
        type: string
      - name: trust_list
        label: "Trust: Список гарантий"
        type: object
        list: true
        fields:
          - name: title
            label: "Название"
            type: string
          - name: description
            label: "Описание"
            type: text
      - name: testimonials_title
        label: "Testimonials: Заголовок"
        type: string
      - name: testimonials_list
        label: "Testimonials: Список отзывов"
        type: object
        list: true
        fields:
          - name: text
            label: "Текст отзыва"
            type: rich-text
          - name: author
            label: "Автор"
            type: string
          - name: details
            label: "Детали"
            type: string
      - name: pricing_title
        label: "Pricing: Заголовок"
        type: string
      - name: pricing_list
        label: "Pricing: Список тарифов"
        type: object
        list: true
        fields:
          - name: label
            label: "Название"
            type: string
          - name: value
            label: "Цена"
            type: string
          - name: description
            label: "Описание"
            type: text
          - name: featured
            label: "Популярный"
            type: boolean
          - name: badge
            label: "Бейдж"
            type: string
      - name: cta_title
        label: "CTA: Заголовок"
        type: string
      - name: cta_text
        label: "CTA: Текст"
        type: text
      - name: contact_phone
        label: "CTA: Телефон"
        type: string

  - name: about
    label: "Страница Обо мне"
    type: file
    path: content/pages/about.yml
    fields:
      - name: seo_title
        label: "SEO: Заголовок"
        type: string
      - name: seo_description
        label: "SEO: Описание"
        type: text
      - name: header_tag
        label: "Header: Тег"
        type: string
      - name: header_title
        label: "Header: Заголовок"
        type: string
      - name: header_subtitle
        label: "Header: Подзаголовок"
        type: string
      - name: lead_text
        label: "Lead: Вводный текст"
        type: rich-text
      - name: bio_paragraph_1
        label: "Bio: Параграф 1"
        type: rich-text
      - name: bio_paragraph_2
        label: "Bio: Параграф 2"
        type: rich-text
      - name: education_title
        label: "Education: Заголовок"
        type: string
      - name: education_items
        label: "Education: Список"
        type: string
        list: true
      - name: approach_title
        label: "Approach: Заголовок"
        type: string
      - name: approach_text
        label: "Approach: Текст"
        type: rich-text
      - name: about_image
        label: "Изображение"
        type: image
      - name: call_to_action
        label: "CTA: Текст кнопки"
        type: string
      - name: call_to_action_link
        label: "CTA: Ссылка"
        type: string

  - name: services
    label: "Страница Услуги"
    type: file
    path: content/pages/services.yml
    fields:
      - name: seo_title
        label: "SEO: Заголовок"
        type: string
      - name: seo_description
        label: "SEO: Описание"
        type: text
      - name: header_tag
        label: "Header: Тег"
        type: string
      - name: header_title
        label: "Header: Заголовок"
        type: string
      - name: header_subtitle
        label: "Header: Подзаголовок"
        type: string
      - name: intro_text
        label: "Intro: Вводный текст"
        type: rich-text
      - name: services
        label: "Services: Список услуг"
        type: object
        list: true
        fields:
          - name: title
            label: "Название"
            type: string
          - name: description
            label: "Описание"
            type: rich-text
          - name: duration
            label: "Длительность"
            type: string
          - name: price
            label: "Цена"
            type: string
      - name: how_it_works_title
        label: "How: Заголовок"
        type: string
      - name: how_it_works_steps
        label: "How: Шаги"
        type: string
        list: true
      - name: cta_title
        label: "CTA: Заголовок"
        type: string
      - name: cta_text
        label: "CTA: Текст"
        type: text
      - name: cta_button
        label: "CTA: Текст кнопки"
        type: string
      - name: services_image
        label: "Изображение"
        type: image
      - name: cta_link
        label: "CTA: Ссылка"
        type: string

  - name: contact
    label: "Страница Контакты"
    type: file
    path: content/pages/contact.yml
    fields:
      - name: seo_title
        label: "SEO: Заголовок"
        type: string
      - name: seo_description
        label: "SEO: Описание"
        type: text
      - name: header_tag
        label: "Header: Тег"
        type: string
      - name: header_title
        label: "Header: Заголовок"
        type: string
      - name: header_subtitle
        label: "Header: Подзаголовок"
        type: string
      - name: contact_info_title
        label: "Contacts: Заголовок"
        type: string
      - name: phone
        label: "Телефон"
        type: string
      - name: email
        label: "Email"
        type: string
      - name: location
        label: "Локация"
        type: string
      - name: telegram_label
        label: "Telegram: Подпись"
        type: string
      - name: telegram_link
        label: "Telegram: Ссылка"
        type: string
      - name: channel_label
        label: "Канал: Подпись"
        type: string
      - name: channel_link
        label: "Канал: Ссылка"
        type: string
      - name: whatsapp_label
        label: "WhatsApp: Подпись"
        type: string
      - name: whatsapp_link
        label: "WhatsApp: Ссылка"
        type: string
      - name: email_label
        label: "Email: Подпись"
        type: string
      - name: email_link
        label: "Email: Ссылка"
        type: string
      - name: form_title
        label: "Form: Заголовок"
        type: string
      - name: form_description
        label: "Form: Описание"
        type: text
      - name: form_submit_button
        label: "Form: Текст кнопки"
        type: string
      - name: form_privacy_text
        label: "Form: Текст согласия"
        type: text
      - name: response_time
        label: "Form: Время ответа"
        type: string
      - name: contact_image
        label: "Изображение"
        type: image
      - name: footer_text
        label: "Footer: Текст"
        type: string

  - name: blog
    label: "Страница Блог"
    type: file
    path: content/pages/blog.yml
    fields:
      - name: seo_title
        label: "SEO: Заголовок"
        type: string
      - name: seo_description
        label: "SEO: Описание"
        type: text
      - name: blog_title
        label: "Blog: Заголовок"
        type: string
      - name: blog_subtitle
        label: "Blog: Подзаголовок"
        type: text
      - name: blog_posts
        label: "Blog: Список статей"
        type: object
        list: true
        fields:
          - name: title
            label: "Название"
            type: string
          - name: description
            label: "Описание"
            type: text
          - name: url
            label: "Ссылка"
            type: string
          - name: tags
            label: "Теги"
            type: string
            list: true
