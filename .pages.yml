media:
  input: "images"
  output: "images"

content:
  - name: homepage
    label: "Главная страница"
    type: file
    path: "index.html"
    fields:
      - name: meta_title
        label: "SEO: Заголовок страницы (Title)"
        type: string
      - name: meta_description
        label: "SEO: Описание (Description)"
        type: text
      - name: hero_title
        label: "Главный заголовок"
        type: string
      - name: hero_subtitle
        label: "Подзаголовок / Описание"
        type: text

  - name: blog
    label: "Блог"
    type: collection
    path: "blog"
    view:
      fields: [title, date]
    fields:
      - name: title
        label: "Заголовок статьи"
        type: string
      - name: date
        label: "Дата"
        type: date
      - name: body
        label: "Текст статьи"
        type: rich-text
