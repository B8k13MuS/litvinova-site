media:
  input: images
  output: /images

content:
  - name: blog
    label: Блог
    type: collection
    path: blog
    view:
      fields: [title, date]
    fields:
      - name: title
        label: Заголовок
        type: string
      - name: date
        label: Дата
        type: date
      - name: body
        label: Контент
        type: rich-text

  - name: images
    label: Изображения
    type: collection
    path: images
    view:
      type: gallery

  - name: pages
    label: Страницы сайта
    type: collection
    path: content/pages
    view:
      fields: [title]
    fields:
      - name: title
        label: Заголовок страницы (SEO)
        type: string
      - name: description
        label: Описание (SEO)
        type: string
      - name: keywords
        label: Ключевые слова (SEO)
        type: string
