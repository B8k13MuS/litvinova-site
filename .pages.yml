media:
  input: images
  output: /images

content:
  - name: pages
    label: "Страницы сайта"
    type: collection
    path: content/pages
    fields:
      - name: seo_title
        label: "SEO: Заголовок страницы"
        type: string
      - name: seo_description
        label: "SEO: Описание"
        type: text
      - name: hero_title
        label: "Hero: Главный заголовок"
        type: rich-text
        description: "Используйте <br> для переносов"
      - name: hero_description
        label: "Hero: Описание"
        type: rich-text
      - name: hero_cta
        label: "Hero: Текст кнопки"
        type: string
      - name: issues_title
        label: "Issues: Заголовок"
        type: string
      - name: issues_list
        label: "Issues: Список"
        type: object
        list: true
        fields:
          - name: title
            label: "Название"
            type: string
          - name: description
            label: "Описание"
            type: rich-text
      - name: about_title
        label: "About: Заголовок"
        type: string
      - name: methods_title
        label: "Methods: Заголовок"
        type: string
      - name: methods_list
        label: "Methods: Список"
        type: object
        list: true
        fields:
          - name: title
            label: "Название"
            type: string
          - name: description
            label: "Описание"
            type: rich-text
      - name: process_title
        label: "Process: Заголовок"
        type: string
      - name: process_list
        label: "Process: Список"
        type: object
        list: true
        fields:
          - name: title
            label: "Название"
            type: string
          - name: description
            label: "Описание"
            type: rich-text
      - name: trust_title
        label: "Trust: Заголовок"
        type: string
      - name: trust_list
        label: "Trust: Список"
        type: object
        list: true
        fields:
          - name: title
            label: "Название"
            type: string
          - name: description
            label: "Описание"
            type: rich-text
      - name: testimonials_title
        label: "Testimonials: Заголовок"
        type: string
      - name: testimonials_list
        label: "Testimonials: Список"
        type: object
        list: true
        fields:
          - name: text
            label: "Текст"
            type: rich-text
          - name: author
            label: "Автор"
            type: string
          - name: details
            label: "Детали"
            type: string
      - name: pricing_title
        label: "Pricing: Заголовок"
        type: string
      - name: pricing_list
        label: "Pricing: Список"
        type: object
        list: true
        fields:
          - name: label
            label: "Название"
            type: string
          - name: value
            label: "Значение"
            type: string
          - name: description
            label: "Описание"
            type: rich-text
          - name: featured
            label: "Популярный"
            type: boolean
          - name: badge
            label: "Бейдж"
            type: string
      - name: form_title
        label: "Form: Заголовок"
        type: string
      - name: cta_title
        label: "CTA: Заголовок"
        type: string
      - name: contact_phone
        label: "CTA: Телефон"
        type: string
