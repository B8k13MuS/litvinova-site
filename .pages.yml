media:
  input: "images"
  output: "images"

content:
  # --- 1. ГЛАВНАЯ СТРАНИЦА ---
  - name: homepage
    label: "Главная страница"
    type: file
    path: "index.html"
    fields:
      - name: meta_title
        label: "SEO: Заголовок страницы (Title)"
        type: string
      - name: meta_description
        label: "SEO: Описание (Description)"
        type: text
      - name: hero_title
        label: "Главный заголовок"
        type: string
      - name: hero_subtitle
        label: "Подзаголовок / Описание"
        type: text

  # --- 2. ОБО МНЕ ---
  - name: about
    label: "Обо мне"
    type: file
    path: "about.html"
    fields:
      - name: meta_title
        label: "SEO Заголовок"
        type: string
      - name: body
        label: "Текст страницы (HTML)"
        type: text

  # --- 3. УСЛУГИ И ЦЕНЫ ---
  - name: services
    label: "Услуги и расценки"
    type: file
    path: "services.html"
    fields:
      - name: meta_title
        label: "SEO Заголовок"
        type: string
      - name: body
        label: "Текст страницы (HTML)"
        type: text

  # --- 4. КАК Я РАБОТАЮ (МЕТОДЫ) ---
  - name: methods
    label: "Как я работаю"
    type: file
    path: "methods.html"
    fields:
      - name: meta_title
        label: "SEO Заголовок"
        type: string
      - name: body
        label: "Текст страницы (HTML)"
        type: text

  # --- 5. КОНТАКТЫ ---
  - name: contacts
    label: "Контакты"
    type: file
    path: "contacts.html"
    fields:
      - name: meta_title
        label: "SEO Заголовок"
        type: string
      - name: body
        label: "Текст страницы (HTML)"
        type: text

  # --- 6. БЛОГ ---
  - name: blog
    label: "Блог"
    type: collection
    path: ""
    filename: "blog-{slug}.html"
    exclude: ["blog.html"]
    view:
      fields: [title, date]
    fields:
      - name: title
        label: "Заголовок статьи"
        type: string
      - name: date
        label: "Дата"
        type: date
      - name: body
        label: "Текст статьи"
        type: text
