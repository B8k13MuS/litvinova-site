issues_title: С чем я работаю
issues:
  - title: Травма и ПТСР
    description: Тревожные воспоминания, кошмары, избегание — всё, что продолжает
      влиять на жизнь после пережитого
  - title: Тревога и панические атаки
    description: Постоянное беспокойство, страхи, панические атаки, социальная
      тревожность, невозможность расслабиться
  - title: Выгорание
    description: Эмоциональное истощение, потеря смысла, хроническая усталость,
      ощущение пустоты
  - title: Отношения
    description: Конфликты в паре, токсичные паттерны, страх близости, повторяющиеся
      сценарии
  - title: Депрессия и апатия
    description: Подавленное настроение, потеря интереса, чувство бессмысленности,
      эмоциональная пустота
  - title: Самооценка и идентичность
    description: Неуверенность, работа с внутренним критиком, поиск себя, низкая самооценка
about_title: Обо мне
about_preview_text: "Психолог, специализирующийся на работе с травмой,
  тревожными расстройствами, выгоранием и кризисами в отношениях. В практике
  использую современные доказательные методы: EMDR, ММИЛ и интегративный
  подход."
about_preview_subtitle: Работаю онлайн по всему миру — каждая сессия проходит в
  безопасной и конфиденциальной обстановке. Подбираю метод индивидуально под
  запрос клиента.
about_preview_details: Мой подход объединяет КПТ, ЭОТ, ЭФТ, ОРКТ, RPT, DBT и
  Brainspotting — что позволяет выстраивать стратегию, которая подходит именно
  вам.
about_preview_cta: Подробнее обо мне
about_preview_link: about.html
methods_title: Как я работаю
methods:
  - title: EMDR
    description: Десенсибилизация и переработка движением глаз — один из наиболее
      изученных методов работы с травмой, ПТСР, тревогой и фобиями. Помогает
      мозгу переработать болезненные воспоминания.
  - title: ММИЛ
    description: Метафорические ассоциативные карты — исследовательский подход,
      работающий через образы и метафоры. Позволяет обратиться к
      бессознательному, выявить скрытые ресурсы и внутренние конфликты.
  - title: Интегративный подход
    description: Сочетание КПТ, ЭОТ, ЭФТ, ОРКТ, RPT, DBT и Brainspotting — позволяет
      подбирать стратегию индивидуально. Не один метод для всех, а лучший метод
      для вас.
process_title: Как проходит работа
process_steps:
  - title: Знакомство
    description: Первая встреча — диагностическая. Обсуждаем запрос, цели, ожидания.
      Определяем, подходим ли друг другу.
  - title: План работы
    description: Формируем индивидуальный план, выбираем методы, определяем частоту встреч.
  - title: Терапия
    description: Регулярные сессии с применением выбранных методов. Глубокая работа
      с запросом и поддержка на каждом этапе.
  - title: Результат
    description: Закрепление достижений, обсуждение дальнейших шагов. При
      необходимости — план самостоятельной работы.
trust_title: Гарантии и конфиденциальность
trust_items:
  - title: Полная конфиденциальность
    description: Всё, что обсуждается на сессии, остаётся между нами. Строгие
      этические нормы психолога.
  - title: Документальное образование
    description: Высшее психологическое образование, специализированное обучение по
      EMDR и ММИЛ.
  - title: Безопасная среда
    description: Никаких осуждений и давления. Пространство, где можно быть собой и
      говорить открыто.
  - title: Первичная консультация
    description: На первой встрече определяем, подходим ли друг другу. Без давления
      и обязательств.
testimonials_title: Клиенты о работе
testimonials:
  - text: После нескольких сессий EMDR я наконец смогла спокойно вспоминать о том,
      что пережила. Тревога ушла, сон нормализовался. Надежда — очень
      внимательный и профессиональный специалист.
  - text: Долго искал психолога, который работает с Brainspotting. Надежда помогла
      разобраться с хроническим напряжением в теле, которое мучило годами.
      Рекомендую.
  - text: Работа с метафорическими картами открыла мне глаза на многие вещи. Я
      поняла, почему повторяю одни и те же сценарии в отношениях. Огромная
      благодарность.
