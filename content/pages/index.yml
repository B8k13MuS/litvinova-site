title: Надежда Литвинова — Психолог, специалист по EMDR | Онлайн по всему мир
description: Надежда Литвинова — психолог, специалист по EMDR и ММИЛ.
  Онлайн-приём по всему миру. Помогаю с травмой, тревогой, выгоранием,
  отношениями.
keywords: психолог, EMDR, ММИЛ, травма, тревога, выгорание, онлайн консультация,
  Надежда Литвинова
hero_title: Прошлое переработать. Будущее выбрать. Настоящее жить
hero_description: Помогаю справиться с травмой, тревогой, выгоранием и
  сложностями в отношениях. Работаю онлайн — из любой точки мира.
issues_title: С чем я работаю
issues:
  - title: Травма и ПТСР
    description: Тревожные воспоминания, кошмары, избегание — всё, что продолжает
      влиять на жизнь после пережитого
  - title: Тревога и панические атаки
    description: Постоянное беспокойство, страхи, панические атаки, социальная
      тревожность, невозможность расслабиться
  - title: Выгорание
    description: Эмоциональное истощение, потеря смысла, хроническая усталость,
      ощущение пустоты
  - title: Отношения
    description: Конфликты в паре, токсичные паттерны, страх близости, повторяющиеся
      сценарии
  - title: Депрессия и апатия
    description: Подавленное настроение, потеря интереса, чувство бессмысленности,
      эмоциональная пустота
  - title: Самооценка и идентичность
    description: Неуверенность, работа с внутренним критиком, поиск себя, низкая самооценка
methods_title: Как я работаю
methods:
  - title: EMDR
    description: Десенсибилизация и переработка движением глаз — один из наиболее
      изученных методов работы с травмой, ПТСР, тревогой и фобиями. Помогает
      мозгу переработать болезненные воспоминания.
  - title: ММИЛ
    description: Метафорические ассоциативные карты — исследовательский подход,
      работающий через образы и метафоры. Позволяет обратиться к
      бессознательному, выявить скрытые ресурсы и внутренние конфликты.
  - title: Интегративный подход
    description: Сочетание КПТ, ЭОТ, ЭФТ, ОРКТ, RPT, DBT и Brainspotting — позволяет
      подбирать стратегию индивидуально. Не один метод для всех, а лучший метод
      для вас.
process_title: Как проходит работа
process_steps:
  - description: Первая встреча — диагностическая. Обсуждаем запрос, цели, ожидания.
      Определяем, подходим ли друг другу.
  - description: Формируем индивидуальный план, выбираем методы, определяем частоту встреч.
  - description: Регулярные сессии с применением выбранных методов. Глубокая работа
      с запросом и поддержка на каждом этапе.
  - description: Закрепление достижений, обсуждение дальнейших шагов. При
      необходимости — план самостоятельной работы.
pricing_title: Форматы консультаций
pricing_items:
  - duration: 60 мин
    description: Знакомство, разбор запроса, определение подхода к работе
  - duration: 50–60 мин
    description: EMDR, ММИЛ, интегративный подход — выбирается под запрос
  - duration: 5 встреч
    description: Для глубокой проработки запроса — удобнее по времени и ритму
cta_title: Готовы сделать первый шаг?
