header_tag: Обо мне
header_title: Надежда Литвинова
header_subtitle: Психолог, специалист по EMDR, интегративный подход
lead_text: Я верю, что каждый человек обладает внутренними ресурсами для
  восстановления. Моя задача — помочь вам их найти и активировать.
bio_paragraph_1: Более 10 лет я помогаю людям справляться с трудными жизненными
  ситуациями. За это время я работала с сотнями клиентов, помогая им
  преодолевать страхи, тревогу, последствия травм и стресса.
bio_paragraph_2: Использую доказательные методы. Постоянно прохожу супервизии и
  повышение квалификации, чтобы предлагать клиентам самые эффективные подходы.
education_title: Образование и квалификация
education_items:
  - Высшее психологическое образование
  - Сертифицированный специалист по EMDR
  - Регулярная супервизия и повышение квалификации
approach_title: Мой подход
approach_text: Я работаю в интегративном подходе, сочетая различные методы под
  запрос клиента. Основа — EMDR и ММИЛ для работы с травмой, тревогой и
  стрессом.
