  <style>
    /* ... ВЕСЬ ВАШ ОРИГИНАЛЬНЫЙ CSS ОСТАЕТСЯ БЕЗ ИЗМЕНЕНИЙ ... */
    :root{--bg-primary:#0A0A0A;--bg-secondary:#111111;--bg-card:#141414;--bg-card-hover:#1A1A1A;--bg-elevated:#1C1C1C;--gold:#C9A96E;--gold-light:#D4AF37;--gold-dark:#A68B4B;--gold-glow:rgba(201,169,110,0.15);--gold-glow-strong:rgba(201,169,110,0.3);--text-primary:#FFFFFF;--text-secondary:rgba(255,255,255,0.65);--text-muted:rgba(255,255,255,0.4);--text-dim:rgba(255,255,255,0.2);--border:rgba(255,255,255,0.06);--border-gold:rgba(201,169,110,0.25);--font-display:'Playfair Display',Georgia,serif;--font-body:'Inter',system-ui,sans-serif;--radius:16px;--radius-xl:24px;--radius-sm:10px;--shadow:0 4px 32px rgba(0,0,0,0.4);--shadow-gold:0 0 40px rgba(201,169,110,0.12);--trans:0.35s cubic-bezier(0.4,0,0.2,1);--container:1200px;}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{font-family:var(--font-body);font-size:16px;line-height:1.7;color:var(--text-secondary);background:var(--bg-primary);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden;}
    img{max-width:100%;height:auto;display:block;}
    a{color:inherit;text-decoration:none;transition:var(--trans);}
    ul,ol{list-style:none;}
    button{font-family:inherit;cursor:pointer;border:none;background:none;}
    ::selection{background:var(--gold-glow-strong);color:var(--text-primary);}
    ::-webkit-scrollbar{width:6px;}
    ::-webkit-scrollbar-track{background:var(--bg-primary);}
    ::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:3px;}
    .container{max-width:var(--container);margin:0 auto;padding:0 32px;position:relative;z-index:1;}
    .eyebrow{font-family:var(--font-body);font-size:11px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;display:block;}
    .section{position:relative;padding:120px 0;overflow:hidden;}
    .section-header{text-align:center;margin-bottom:72px;max-width:640px;margin-left:auto;margin-right:auto;}
    .section-header h2{font-family:var(--font-display);font-size:clamp(2.2rem,4vw,3.4rem);font-weight:500;color:var(--text-primary);line-height:1.15;margin-bottom:20px;}
    .section-header p{font-size:17px;color:var(--text-muted);line-height:1.7;}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:16px 36px;background:var(--gold);color:var(--bg-primary);border-radius:100px;font-family:var(--font-body);font-size:14px;font-weight:600;letter-spacing:0.04em;transition:var(--trans);border:2px solid var(--gold);position:relative;overflow:hidden;}
    .btn::before{content:'';position:absolute;inset:0;background:var(--gold-light);transform:translateX(-100%);transition:var(--trans);z-index:0;}
    .btn:hover::before{transform:translateX(0);}
    .btn span{position:relative;z-index:1;}
    .btn:hover{box-shadow:0 0 30px var(--gold-glow-strong);transform:translateY(-2px);}
    .btn-outline{background:transparent;color:var(--gold);}
    .btn-outline::before{background:var(--gold-glow);}
    .btn-outline:hover{color:var(--gold-light);}
    .btn-lg{padding:18px 44px;font-size:15px;}
    header{position:fixed;top:0;left:0;right:0;z-index:1000;padding:20px 0;transition:var(--trans);}
    header.scrolled{background:rgba(10,10,10,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .header-inner{display:flex;align-items:center;justify-content:space-between;max-width:var(--container);margin:0 auto;padding:0 32px;}
    .logo{display:flex;flex-direction:column;gap:2px;}
    .logo-name{font-family:var(--font-display);font-size:22px;font-weight:500;color:var(--text-primary);line-height:1.1;letter-spacing:0.02em;}
    .logo-sub{font-size:10px;font-weight:400;letter-spacing:0.18em;color:var(--gold);text-transform:uppercase;}
    header nav ul{display:flex;gap:40px;align-items:center;}
    header nav a{font-size:14px;font-weight:400;color:var(--text-secondary);position:relative;}
    header nav a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:var(--trans);}
    header nav a:hover{color:var(--text-primary);}
    header nav a:hover::after{width:100%;}
    .menu-toggle{display:none;color:var(--text-primary);padding:8px;}
    .hero{min-height:100vh;display:flex;align-items:center;position:relative;padding:140px 0 100px;background:var(--bg-primary);overflow:hidden;}
    .hero::before{content:'';position:absolute;top:-20%;right:-10%;width:700px;height:700px;background:radial-gradient(circle,rgba(201,169,110,0.08) 0%,transparent 70%);pointer-events:none;animation:orbPulse 8s ease-in-out infinite;}
    @keyframes orbPulse{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.1);opacity:1;}}
    .hero-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:80px;align-items:center;max-width:var(--container);margin:0 auto;padding:0 32px;position:relative;z-index:1;}
    .hero-content .eyebrow{margin-bottom:28px;}
    .hero-content h1{font-family:var(--font-display);font-size:clamp(2.8rem,5.5vw,5rem);font-weight:500;line-height:1.08;color:var(--text-primary);margin-bottom:28px;}
    .hero-content h1 em{font-style:italic;color:var(--gold);position:relative;}
    .hero-content h1 em::after{content:'';position:absolute;bottom:4px;left:0;right:0;height:3px;background:var(--gold);opacity:0.3;}
    .hero-lead{font-size:18px;color:var(--text-secondary);max-width:480px;margin-bottom:40px;line-height:1.75;}
    .hero-cta{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}
    .hero-trust{display:flex;align-items:center;gap:24px;margin-top:48px;padding-top:32px;border-top:1px solid var(--border);}
    .trust-item{display:flex;flex-direction:column;gap:4px;}
    .trust-item strong{font-family:var(--font-display);font-size:28px;font-weight:600;color:var(--gold);line-height:1;}
    .trust-item span{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em;}
    .hero-image{position:relative;}
    .hero-image img{width:100%;height:620px;object-fit:cover;border-radius:var(--radius-xl);box-shadow:var(--shadow);}
    .hero-image::before{content:'';position:absolute;top:-16px;right:-16px;bottom:16px;left:16px;border:1px solid var(--border-gold);border-radius:var(--radius-xl);pointer-events:none;z-index:-1;}
    .floral-float{position:absolute;top:-40px;right:-30px;width:180px;height:180px;opacity:0.15;animation:float 6s ease-in-out infinite;}
    @keyframes float{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-15px) rotate(3deg);}}
    .issues-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:var(--container);margin:0 auto;padding:0 32px;}
    .issue-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:40px 32px;transition:var(--trans);position:relative;overflow:hidden;}
    .issue-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:var(--trans);}
    .issue-card:hover{background:var(--bg-card-hover);border-color:var(--border-gold);transform:translateY(-4px);box-shadow:var(--shadow-gold);}
    .issue-card:hover::before{transform:scaleX(1);}
    .issue-icon{width:48px;height:48px;border-radius:12px;background:var(--gold-glow);display:flex;align-items:center;justify-content:center;margin-bottom:24px;color:var(--gold);}
    .issue-icon svg{width:24px;height:24px;}
    .issue-card h3{font-family:var(--font-display);font-size:1.35rem;font-weight:500;color:var(--text-primary);margin-bottom:12px;}
    .issue-card p{font-size:14.5px;color:var(--text-muted);line-height:1.7;}
    .about-grid{display:grid;grid-template-columns:1fr 1.1fr;gap:100px;align-items:center;max-width:var(--container);margin:0 auto;padding:0 32px;}
    .about-image{position:relative;}
    .about-image img{width:100%;height:580px;object-fit:cover;border-radius:var(--radius-xl);}
    .about-image::after{content:'';position:absolute;inset:0;border-radius:var(--radius-xl);background:linear-gradient(180deg,transparent 60%,rgba(10,10,10,0.6) 100%);pointer-events:none;}
    .about-content .eyebrow{margin-bottom:20px;}
    .about-content h2{font-family:var(--font-display);font-size:clamp(2rem,3.5vw,3rem);font-weight:500;color:var(--text-primary);line-height:1.2;margin-bottom:28px;}
    .about-content p{color:var(--text-secondary);font-size:16px;margin-bottom:20px;line-height:1.8;}
    .about-content strong{color:var(--text-primary);font-weight:500;}
    .about-cta{margin-top:32px;}
    .methods-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:var(--container);margin:0 auto;padding:0 32px;}
    .method-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:48px 36px;transition:var(--trans);position:relative;overflow:hidden;}
    .method-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold);transform:scaleX(0);transform-origin:center;transition:var(--trans);}
    .method-card:hover{background:var(--bg-card-hover);border-color:var(--border-gold);transform:translateY(-6px);box-shadow:var(--shadow-gold);}
    .method-card:hover::after{transform:scaleX(1);}
    .method-number{font-family:var(--font-display);font-size:3.5rem;font-weight:400;color:var(--gold);opacity:0.2;line-height:1;margin-bottom:16px;}
    .method-card h3{font-family:var(--font-display);font-size:1.5rem;font-weight:500;color:var(--text-primary);margin-bottom:14px;}
    .method-card p{font-size:14.5px;color:var(--text-muted);line-height:1.7;}
    .process-section{background:var(--bg-secondary);}
    .process-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;max-width:var(--container);margin:0 auto;padding:0 32px;}
    .process-step{position:relative;padding:40px 28px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);transition:var(--trans);}
    .process-step:hover{border-color:var(--border-gold);transform:translateY(-4px);}
    .step-number{font-family:var(--font-display);font-size:4rem;font-weight:400;color:var(--gold);opacity:0.25;line-height:1;margin-bottom:20px;}
    .process-step h3{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:12px;}
    .process-step p{font-size:14px;color:var(--text-muted);line-height:1.7;}
    .process-step:not(:last-child)::after{content:'';position:absolute;top:50%;right:-32px;width:32px;height:1px;background:var(--border-gold);transform:translateY(-50%);}
    .trust-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;max-width:840px;margin:0 auto;padding:0 32px;}
    .trust-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:40px 32px;display:flex;gap:20px;align-items:flex-start;transition:var(--trans);}
    .trust-card:hover{border-color:var(--border-gold);background:var(--bg-card-hover);}
    .trust-icon{width:52px;height:52px;border-radius:14px;background:var(--gold-glow);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gold);}
    .trust-icon svg{width:26px;height:26px;}
    .trust-card h3{font-family:var(--font-display);font-size:1.25rem;font-weight:500;color:var(--text-primary);margin-bottom:8px;}
    .trust-card p{font-size:14px;color:var(--text-muted);line-height:1.7;}
    .testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:var(--container);margin:0 auto;padding:0 32px;}
    .testimonial-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:40px 32px;display:flex;flex-direction:column;transition:var(--trans);position:relative;}
    .testimonial-card::before{content:'\"';font-family:var(--font-display);font-size:5rem;color:var(--gold);opacity:0.15;line-height:1;position:absolute;top:16px;right:24px;}
    .testimonial-card:hover{border-color:var(--border-gold);transform:translateY(-4px);}
    .testimonial-card blockquote{font-family:var(--font-display);font-size:1.15rem;font-style:italic;color:var(--text-secondary);line-height:1.7;margin-bottom:28px;flex:1;position:relative;z-index:1;}
    .testimonial-meta{display:flex;align-items:center;gap:14px;padding-top:24px;border-top:1px solid var(--border);}
    .t-avatar{width:48px;height:48px;border-radius:50%;background:var(--gold-glow);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:1.1rem;color:var(--gold);flex-shrink:0;border:1px solid var(--border-gold);}
    .t-info strong{display:block;font-size:14px;font-weight:500;color:var(--text-primary);}
    .t-info span{font-size:12px;color:var(--text-muted);}
    .pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:960px;margin:0 auto;padding:0 32px;}
    .pricing-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:48px 36px;text-align:center;position:relative;display:flex;flex-direction:column;transition:var(--trans);}
    .pricing-card:hover{border-color:var(--border-gold);transform:translateY(-4px);}
    .pricing-card.featured{background:var(--bg-secondary);border-color:var(--border-gold);box-shadow:var(--shadow-gold);}
    .pricing-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--gold);border-radius:var(--radius) var(--radius) 0 0;}
    .pricing-badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--bg-primary);font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;padding:6px 18px;border-radius:100px;white-space:nowrap;}
    .pricing-label{font-size:11px;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:16px;}
    .pricing-value{font-family:var(--font-display);font-size:2.8rem;font-weight:500;color:var(--gold);line-height:1;margin-bottom:8px;}
    .pricing-desc{font-size:14px;color:var(--text-muted);line-height:1.7;margin:20px 0 32px;flex:1;}
    .pricing-card .btn{width:100%;}
    .pricing-note{text-align:center;font-size:13px;color:var(--text-muted);margin-top:32px;}
    .form-wrap{max-width:600px;margin:0 auto;padding:0 32px;}
    .form{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:56px 48px;}
    .form-row{margin-bottom:24px;}
    .form-row label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:8px;letter-spacing:0.02em;}
    .form-row input,.form-row textarea{width:100%;padding:14px 18px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:15px;color:var(--text-primary);background:var(--bg-secondary);transition:var(--trans);outline:none;}
    .form-row input::placeholder,.form-row textarea::placeholder{color:var(--text-dim);}
    .form-row input:focus,.form-row textarea:focus{border-color:var(--gold);background:var(--bg-elevated);box-shadow:0 0 0 3px var(--gold-glow);}
    .form-row textarea{resize:vertical;min-height:120px;}
    .form-submit{width:100%;margin-top:8px;}
    .form-note{text-align:center;font-size:12px;color:var(--text-dim);margin-top:16px;}
    .cta-section{text-align:center;padding:120px 32px;background:var(--bg-secondary);position:relative;overflow:hidden;}
    .cta-section::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(201,169,110,0.06) 0%,transparent 70%);pointer-events:none;}
    .cta-section .container{position:relative;z-index:1;}
    .cta-section h2{font-family:var(--font-display);font-size:clamp(2rem,4vw,3.4rem);font-weight:500;color:var(--text-primary);margin-top:20px;margin-bottom:20px;}
    .cta-section>.container>p{color:var(--text-muted);font-size:17px;max-width:480px;margin:0 auto 40px;}
    .cta-links{display:flex;justify-content:center;gap:48px;margin-top:48px;flex-wrap:wrap;}
    .cta-link a{color:var(--text-secondary);font-size:15px;transition:var(--trans);position:relative;}
    .cta-link a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--gold);transition:var(--trans);}
    .cta-link a:hover{color:var(--gold);}
    .cta-link a:hover::after{width:100%;}
    .cta-link span{display:block;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-dim);margin-top:6px;}
    footer{background:var(--bg-primary);border-top:1px solid var(--border);padding:72px 32px 32px;}
    .footer-inner{max-width:var(--container);margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:64px;margin-bottom:56px;}
    .footer-brand .logo-name{color:var(--text-primary);margin-bottom:16px;}
    .footer-brand p{font-size:14px;color:var(--text-muted);line-height:1.7;max-width:300px;margin-bottom:24px;}
    .footer-socials{display:flex;gap:16px;flex-wrap:wrap;}
    .footer-socials a{font-size:13px;color:var(--gold);opacity:0.7;transition:var(--trans);position:relative;}
    .footer-socials a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--gold);transition:var(--trans);}
    .footer-socials a:hover{opacity:1;}
    .footer-socials a:hover::after{width:100%;}
    .footer-col h4{font-size:11px;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;}
    .footer-col a{display:block;font-size:14px;color:var(--text-muted);margin-bottom:12px;transition:var(--trans);position:relative;width:fit-content;}
    .footer-col a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--gold);transition:var(--trans);}
