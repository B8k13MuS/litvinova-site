  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"e1f6df60-fc75-4da3-8ecc-9d1ca4e1f436\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<link href=\"https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&amp;family=Inter:wght@400;500;600&amp;display=swap\" rel=\"stylesheet\">\n<style>\n  *{box-sizing:border-box;}\n  html{scroll-behavior:smooth;}\n  body{margin:0;background:#F9F6F0;}\n  ::selection{background:#E8A87C;color:#2C3E50;}\n  @keyframes lpFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}\n  @media (max-width:760px){\n    .lp-head{padding:14px 20px !important;}\n    .lp-nav{gap:12px !important;}\n    .lp-nav a{display:none !important;}\n    .lp-hero-sec{padding:100px 20px 52px !important;}\n    .lp-pad{padding:58px 20px !important;}\n    .lp-foot{padding:54px 20px 30px !important;}\n    .lp-row{flex-direction:column !important;gap:36px !important;}\n    .lp-hero-photo{flex:0 0 auto !important;width:100% !important;}\n    .lp-hero-deco{inset:12px 6px -8px 6px !important;}\n    .lp-hero-img{height:400px !important;}\n    .lp-about-photo{flex:0 0 auto !important;width:100% !important;}\n    .lp-about-img{height:340px !important;}\n    .lp-stats{gap:26px !important;margin-top:40px !important;flex-wrap:wrap !important;}\n    .lp-stats > div:nth-child(even){display:none !important;}\n    .lp-grid2{grid-template-columns:1fr !important;}\n    .lp-grid3{grid-template-columns:1fr !important;}\n    .lp-grid4{grid-template-columns:1fr 1fr !important;}\n    .lp-modal{padding:30px 22px !important;}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"font-family:Inter,-apple-system,sans-serif;color:#1A1A1A;background:#F9F6F0;min-height:100vh;\">\n\n  <!-- ============ HEADER ============ -->\n  <header style=\"position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(249,246,240,0.82);backdrop-filter:blur(12px);border-bottom:1px solid #ece4d6;\">\n    <div class=\"lp-head\" style=\"max-width:1200px;margin:0 auto;padding:18px 40px;display:flex;align-items:center;justify-content:space-between;\">\n      <a href=\"#hero\" style=\"text-decoration:none;display:flex;flex-direction:column;line-height:1;\">\n        <span style=\"font-family:'Playfair Display',serif;font-size:21px;font-weight:600;color:#2C3E50;letter-spacing:.01em;\">Надежда Литвинова<\u002Fspan>\n        <span style=\"font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#a98a6e;margin-top:5px;\">психолог · коуч<\u002Fspan>\n      <\u002Fa>\n      <nav class=\"lp-nav\" style=\"display:flex;align-items:center;gap:34px;\">\n        <a href=\"#about\" style=\"text-decoration:none;color:#41505e;font-size:15px;transition:color .2s;\" style-hover=\"color:#2C3E50;\">Обо мне<\u002Fa>\n        <a href=\"#how\" style=\"text-decoration:none;color:#41505e;font-size:15px;transition:color .2s;\" style-hover=\"color:#2C3E50;\">Как я работаю<\u002Fa>\n        <a href=\"#results\" style=\"text-decoration:none;color:#41505e;font-size:15px;transition:color .2s;\" style-hover=\"color:#2C3E50;\">Результаты<\u002Fa>\n        <a href=\"#pricing\" style=\"text-decoration:none;color:#41505e;font-size:15px;transition:color .2s;\" style-hover=\"color:#2C3E50;\">Стоимость<\u002Fa>\n        <a href=\"#blog\" style=\"text-decoration:none;color:#41505e;font-size:15px;transition:color .2s;\" style-hover=\"color:#2C3E50;\">Блог<\u002Fa>\n        <button onclick=\"{{ openModal }}\" style=\"padding:12px 24px;background:#2C3E50;color:#fff;border:none;border-radius:2px;font-family:Inter,sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:background .2s,transform .2s;\" style-hover=\"background:#1f2d3b;transform:translateY(-1px);\">Записаться<\u002Fbutton>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ HERO ============ -->\n  <section id=\"hero\" class=\"lp-hero-sec\" style=\"scroll-margin-top:90px;padding:160px 40px 110px;max-width:1200px;margin:0 auto;\">\n    <div class=\"lp-row\" style=\"display:flex;gap:72px;align-items:center;\">\n      <div style=\"flex:1;min-width:0;\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:28px;\">\n          <span style=\"width:40px;height:1px;background:#E8A87C;\"><\u002Fspan>\n          <span style=\"font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#a98a6e;\">13+ лет практики<\u002Fspan>\n        <\u002Fdiv>\n        <h1 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(40px,5vw,62px);line-height:1.06;letter-spacing:-.01em;color:#2C3E50;margin:0 0 26px;text-wrap:balance;\">Перевожу страхи, блоки&nbsp;и стресс <span style=\"font-style:italic;color:#c98a5e;\">в прогресс<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:19px;line-height:1.6;color:#52606d;margin:0 0 40px;max-width:480px;text-wrap:pretty;\">Первая сессия — для спокойствия. Месяц — для глубоких изменений. Работаю на стыке психологии и коучинга.<\u002Fp>\n        <div style=\"display:flex;align-items:center;gap:18px;flex-wrap:wrap;\">\n          <button onclick=\"{{ bookFirst }}\" style=\"display:inline-flex;align-items:center;gap:10px;padding:18px 32px;background:#E8A87C;color:#2C3E50;font-family:Inter,sans-serif;font-weight:600;font-size:16px;border:none;border-radius:2px;cursor:pointer;transition:transform .2s,background .2s,box-shadow .2s;\" style-hover=\"background:#e0976a;transform:translateY(-2px);box-shadow:0 14px 34px rgba(232,168,124,.42);\">Получить спокойствие за 1 сессию →<\u002Fbutton>\n          <button onclick=\"{{ openQuiz }}\" style=\"padding:18px 28px;background:transparent;color:#2C3E50;font-family:Inter,sans-serif;font-weight:500;font-size:16px;border:1px solid #cdbfa9;border-radius:2px;cursor:pointer;transition:border-color .2s,background .2s;\" style-hover=\"border-color:#2C3E50;background:#fff;\">Подобрать формат<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"lp-stats\" style=\"display:flex;gap:40px;margin-top:56px;\">\n          <div><div style=\"font-family:'Playfair Display',serif;font-size:34px;color:#2C3E50;\">13+<\u002Fdiv><div style=\"font-size:13px;color:#7a8591;margin-top:2px;\">лет в&nbsp;практике<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:#e2d8c7;\"><\u002Fdiv>\n          <div><div style=\"font-family:'Playfair Display',serif;font-size:34px;color:#2C3E50;\">1&nbsp;сессия<\u002Fdiv><div style=\"font-size:13px;color:#7a8591;margin-top:2px;\">до первого спокойствия<\u002Fdiv><\u002Fdiv>\n          <div style=\"width:1px;background:#e2d8c7;\"><\u002Fdiv>\n          <div><div style=\"font-family:'Playfair Display',serif;font-size:34px;color:#2C3E50;\">500+<\u002Fdiv><div style=\"font-size:13px;color:#7a8591;margin-top:2px;\">пройденных&nbsp;путей<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"lp-hero-photo\" style=\"flex:0 0 430px;position:relative;\">\n        <div class=\"lp-hero-deco\" style=\"position:absolute;inset:24px -24px -24px 24px;background:#E8A87C;border-radius:4px;opacity:.5;\"><\u002Fdiv>\n        <div class=\"lp-hero-img\" style=\"position:relative;height:560px;border-radius:4px;overflow:hidden;background:repeating-linear-gradient(45deg,#ece4d6,#ece4d6 11px,#e4dac8 11px,#e4dac8 22px);display:flex;align-items:flex-end;justify-content:center;\">\n          <span style=\"font-family:ui-monospace,monospace;font-size:12px;color:#9a8c76;background:rgba(249,246,240,.85);padding:6px 12px;border-radius:2px;margin-bottom:18px;\">фото Надежды · портрет · тёплые тона<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ PROBLEMS ============ -->\n  <section id=\"problems\" style=\"background:#fff;border-top:1px solid #efe7d9;border- gin-bottom:20px;display:flex;align-items:center;justify-content:center;\"><span style=\"width:7px;height:7px;background:#E8A87C;border-radius:50%;\"><\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-family:'Playfair Display',serif;font-size:23px;color:#2C3E50;margin:0 0 8px;font-weight:600;\">Блоки<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;color:#6b7682;margin:0;\">Внутренние ограничения, которые не дают двигаться вперёд.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:38px 40px;border-right:1px solid #ede5d6;border-bottom:1px solid #ede5d6;\">\n          <div style=\"width:30px;height:30px;border:1px solid #E8A87C;border-radius:50%;margin-bottom:20px;display:flex;align-items:center;justify-content:center;\"><span style=\"width:7px;height:7px;background:#E8A87C;border-radius:50%;\"><\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-family:'Playfair Display',serif;font-size:23px;color:#2C3E50;margin:0 0 8px;font-weight:600;\">Травмы<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;color:#6b7682;margin:0;\">Болезненный опыт, который держит в прошлом и не отпускает.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:38px 40px;border-bottom:1px solid #ede5d6;\">\n          <div style=\"width:30px;height:30px;border:1px solid #E8A87C;border-radius:50%;margin-bottom:20px;display:flex;align-items:center;justify-content:center;\"><span style=\"width:7px;height:7px;background:#E8A87C;border-radius:50%;\"><\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-family:'Playfair Display',serif;font-size:23px;color:#2C3E50;margin:0 0 8px;font-weight:600;\">Стресс<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;color:#6b7682;margin:0;\">Хроническое напряжение, выгорание, апатия — когда нет сил.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:38px 40px;border-right:1px solid #ede5d6;\">\n          <div style=\"width:30px;height:30px;border:1px solid #E8A87C;border-radius:50%;margin-bottom:20px;display:flex;align-items:center;justify-content:center;\"><span style=\"width:7px;height:7px;background:#E8A87C;border-radius:50%;\"><\u002Fspan><\u002Fdiv>\n          <h3 style=\"font-family:'Playfair Display',serif;font-size:23px;color:#2C3E50;margin:0 0 8px;font-weight:600;\">Тревога<\u002Fh3>\n          <p style=\"font-size:15px;line-height:1.6;color:#6b7682;margin:0;\">Постоянное беспокойство, которое крадёт настоящее и сон.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:38px 40px;background:#2C3E50;display:flex;flex-direction:column;justify-content:center;\">\n          <p style=\"font-size:16px;line-height:1.55;color:#cdd6df;margin:0 0 20px;\">Узнаёте себя хотя бы в одном? Это уже повод сделать первый шаг.<\u002Fp>\n          <button onclick=\"{{ openModal }}\" style=\"align-self:flex-start;padding:14px 26px;background:#E8A87C;color:#2C3E50;border:none;border-radius:2px;font-family:Inter,sans-serif;font-weight:600;font-size:15px;cursor:pointer;transition:transform .2s,background .2s;\" style-hover=\"background:#e0976a;transform:translateY(-2px);\">Записаться →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ ABOUT ============ -->\n  <section id=\"about\" class=\"lp-pad\" style=\"scroll-margin-top:80px;max-width:1200px;margin:0 auto;padding:110px 40px;\">\n    <div class=\"lp-row\" style=\"display:flex;gap:72px;align-items:flex-start;\">\n      <div data-reveal=\"\" class=\"lp-about-photo\" style=\"opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease;flex:0 0 400px;\">\n        <div class=\"lp-about-img\" style=\"height:500px;border-radius:4px;overflow:hidden;background:repeating-linear-gradient(45deg,#ece4d6,#ece4d6 11px,#e4dac8 11px,#e4dac8 22px);display:flex;align-items:flex-end;justify-content:center;\">\n          <span style=\"font-family:ui-monospace,monospace;font-size:12px;color:#9a8c76;background:rgba(249,246,240,.85);padding:6px 12px;border-radius:2px;margin-bottom:18px;\">фото · крупный план<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .7s ease .1s,transform .7s ease .1s;flex:1;min-width:0;padding-top:8px;\">\n        <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:20px;\"><span style=\"width:40px;height:1px;background:#E8A87C;\"><\u002Fspan><span style=\"font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#a98a6e;\">обо мне<\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(28px,3.2vw,42px);color:#2C3E50;margin:0 0 28px;line-height:1.12;text-wrap:balance;\">Вернуть вам внутреннюю опору и спокойствие<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.72;color:#52606d;margin:0 0 20px;text-wrap:pretty;\">Меня зовут Надежда Литвинова. Более 13 лет я помогаю людям освобождаться от груза страхов и травм. Я работаю на стыке психологии и коучинга, потому что верю: прошлое важно исцелить, а будущее — создать.<\u002Fp>\n        <p style=\"font-size:17px;line-height:1.72;color:#52606d;margin:0 0 36px;text-wrap:pretty;\">Моя задача — не просто дать вам инструменты, а вернуть вашу внутреннюю опору. С первой сессии вы почувствуете разницу.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:8px;\">\n          <div style=\"font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#a98a6e;\">Сертификаты и обучение<\u002Fdiv>\n          <div style=\"display:flex;gap:16px;\">\n            <div style=\"flex:1;height:130px;border-radius:3px;background:repeating-linear-gradient(45deg,#efe8da,#efe8da 9px,#e8dfcd 9px,#e8dfcd 18px);border:1px solid #e6ddcd;display:flex;align-items:flex-end;padding:8px;\"><span style=\"font-family:ui-monospace,monospace;font-size:10px;color:#9a8c76;\">диплом 1<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1;height:130px;border-radius:3px;background:repeating-linear-gradient(45deg,#efe8da,#efe8da 9px,#e8dfcd 9px,#e8dfcd 18px);border:1px solid #e6ddcd;display:flex;align-items:flex-end;padding:8px;\"><span style=\"font-family:ui-monospace,monospace;font-size:10px;color:#9a8c76;\">сертификат 2<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1;height:130px;border-radius:3px;background:repeating-linear-gradient(45deg,#efe8da,#efe8da 9px,#e8dfcd 9px,#e8dfcd 18px);border:1px solid #e6ddcd;display:flex;align-items:flex-end;padding:8px;\"><span style=\"font-family:ui-monospace,monospace;font-size:10px;color:#9a8c76;\">сертификат 3<\u002Fspan><\u002Fdiv>\n            <div style=\"flex:1;height:130px;border-radius:3px;background:repeating-linear-gradient(45deg,#efe8da,#efe8da 9px,#e8dfcd 9px,#e8dfcd 18px);border:1px solid #e6ddcd;display:flex;align-items:flex-end;padding:8px;\"><span style=\"font-family:ui-monospace,monospace;font-size:10px;color:#9a8c76;\">диплом 4<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ HOW I WORK ============ -->\n  <section id=\"how\" style=\"scroll-margin-top:80px;background:#2C3E50;\">\n    <div class=\"lp-pad\" style=\"max-width:1200px;margin:0 auto;padding:104px 40px;\">\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease;text-align:center;margin-bottom:60px;\">\n        <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:18px;\"><span style=\"width:40px;height:1px;background:#E8A87C;\"><\u002Fspan><span style=\"font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#E8A87C;\">процесс<\u002Fspan><span style=\"width:40px;height:1px;background:#E8A87C;\"><\u002Fspan><\u002Fdiv>\n        <h2 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(30px,3.6vw,46px);color:#fff;margin:0;line-height:1.1;text-wrap:balance;\">Как я работаю<\u002Fh2>\n      <\u002Fdiv>\n      <div data-reveal=\"\" style=\"opacity:0;transform:translateY(24px);transition:opacity .7s ease .1s,transform .7s ease .1s;display:grid;grid-template-columns:repeat(4,1fr);gap:28px;\" class=\"lp-grid4\">\n        <div style=\"border-top:1px solid #45566a;padding-top:26px;\">\n          <div style=\"font-family:'Playfair Display',serif;font-size:15px;color:#E8A87C;letter-spacing:.1em;margin-bottom:18px;\">01<\u002Fdiv>\n          <h3 style=\"font-family:'Playfair Display',serif;font-size:21px;color:#fff;margin:0 0 10px;font-weight:500;\">Диагностика<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.65;color:#aab6c2;margin:0;\">Слушаю ваш запрос, нахожу истинную причину — а не только симптом.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid #45566a;padding-top:26px;\">\n          <div style=\"font-family:'Playfair Display',serif;font-size:15px;color:#E8A87C;letter-spacing:.1em;margin-bottom:18px;\">02<\u002Fdiv>\n          <h3 style=\"font-family:'Playfair Display',serif;font-size:21px;color:#fff;margin:0 0 10px;font-weight:500;\">Работа с первопричиной<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.65;color:#aab6c2;margin:0;\">Бережно прорабатываем то, что держит — страх, травму, блок.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid #45566a;padding-top:26px;\">\n          <div style=\"font-family:'Playfair Display',serif;font-size:15px;color:#E8A87C;letter-spacing:.1em;margin-bottom:18px;\">03<\u002Fdiv>\n          <h3 style=\"font-family:'Playfair Display',serif;font-size:21px;color:#fff;margin:0 0 10px;font-weight:500;\">Инструменты<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.65;color:#aab6c2;margin:0;\">Даю практики, которые остаются с вами и работают между сессиями.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid #45566a;padding-top:26px;\">\n          <div style=\"font-family:'Playfair Display',serif;font-size:15px;color:#E8A87C;l "border-color:#E8A87C;\">\n              <input type=\"text\" placeholder=\"Telegram / WhatsApp (по желанию)\" style=\"padding:14px 16px;background:#fff;border:1px solid #e2d8c7;border-radius:2px;font-family:Inter,sans-serif;font-size:15px;color:#1A1A1A;outline:none;\" style-focus=\"border-color:#E8A87C;\">\n              <select value=\"{{ bookingService }}\" onchange=\"{{ setService }}\" style=\"padding:14px 16px;background:#fff;border:1px solid #e2d8c7;border-radius:2px;font-family:Inter,sans-serif;font-size:15px;color:#1A1A1A;outline:none;cursor:pointer;\">\n                <option value=\"\">Выберите услугу<\u002Foption>\n                <option value=\"Первая сессия\">Первая сессия<\u002Foption>\n                <option value=\"Месяц поддержки\">Месяц поддержки<\u002Foption>\n                <option value=\"Глубинная работа\">Глубинная работа<\u002Foption>\n              <\u002Fselect>\n              <label style=\"display:flex;align-items:flex-start;gap:9px;font-size:12px;color:#6b7682;line-height:1.5;cursor:pointer;margin-top:2px;\"><input type=\"checkbox\" required=\"\" style=\"margin-top:2px;accent-color:#E8A87C;\"><span>Я согласен на обработку персональных данных в соответствии с <a href=\"#soglasie\" style=\"color:#2C3E50;\">152-ФЗ<\u002Fa>.<\u002Fspan><\u002Flabel>\n              <button type=\"submit\" style=\"margin-top:6px;padding:16px;background:#E8A87C;color:#2C3E50;border:none;border-radius:2px;font-family:Inter,sans-serif;font-weight:600;font-size:16px;cursor:pointer;transition:background .2s;\" style-hover=\"background:#e0976a;\">Отправить заявку<\u002Fbutton>\n            <\u002Fform>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ QUIZ MODAL ============ -->\n  <sc-if value=\"{{ quizOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeQuiz }}\" style=\"position:fixed;inset:0;z-index:100;background:rgba(26,26,26,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:24px;\">\n      <div onclick=\"{{ stop }}\" class=\"lp-modal\" style=\"background:#F9F6F0;border-radius:6px;max-width:540px;width:100%;padding:44px;position:relative;box-shadow:0 30px 70px rgba(0,0,0,.3);\">\n        <button onclick=\"{{ closeQuiz }}\" aria-label=\"Закрыть\" style=\"position:absolute;top:18px;right:18px;width:36px;height:36px;border:none;background:transparent;font-size:22px;color:#8a939d;cursor:pointer;line-height:1;\">×<\u002Fbutton>\n        <sc-if value=\"{{ quizIsResult }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:8px 0;\">\n            <div style=\"font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#a98a6e;margin-bottom:14px;\">ваш результат<\u002Fdiv>\n            <h3 style=\"font-family:'Playfair Display',serif;font-size:27px;color:#2C3E50;margin:0 0 16px;line-height:1.2;\">{{ quizResultTitle }}<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#52606d;margin:0 0 30px;text-wrap:pretty;\">{{ quizResultText }}<\u002Fp>\n            <div style=\"display:flex;gap:12px;justify-content:center;flex-wrap:wrap;\">\n              <button onclick=\"{{ bookFromQuiz }}\" style=\"padding:15px 28px;background:#E8A87C;color:#2C3E50;border:none;border-radius:2px;font-family:Inter,sans-serif;font-weight:600;font-size:15px;cursor:pointer;transition:background .2s;\" style-hover=\"background:#e0976a;\">Записаться на первую сессию<\u002Fbutton>\n              <button onclick=\"{{ restartQuiz }}\" style=\"padding:15px 22px;background:transparent;color:#2C3E50;border:1px solid #cdbfa9;border-radius:2px;font-family:Inter,sans-serif;font-size:15px;cursor:pointer;\">Пройти заново<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showQuizQuestion }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;\">\n              <div style=\"font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#a98a6e;\">подбор формата<\u002Fdiv>\n              <div style=\"font-size:13px;color:#9aa4af;\">Вопрос {{ quizStepNum }} из {{ quizTotal }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"height:4px;background:#e8dfce;border-radius:2px;margin-bottom:30px;overflow:hidden;\"><div style=\"height:100%;background:#E8A87C;border-radius:2px;transition:width .4s ease;width:{{ quizProgress }};\"><\u002Fdiv><\u002Fdiv>\n            <h3 style=\"font-family:'Playfair Display',serif;font-size:24px;color:#2C3E50;margin:0 0 26px;line-height:1.25;text-wrap:balance;\">{{ quizQuestion }}<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:12px;\">\n              <sc-for list=\"{{ quizOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n                <button onclick=\"{{ opt.onClick }}\" style=\"text-align:left;padding:16px 20px;background:#fff;border:1px solid #e2d8c7;border-radius:3px;font-family:Inter,sans-serif;font-size:15px;color:#2C3E50;cursor:pointer;transition:border-color .2s,background .2s;\" style-hover=\"border-color:#E8A87C;background:#fffdf9;\">{{ opt.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1440,&quot;height&quot;:1024},&quot;autoQuiz&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;revealAnimations&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    modalOpen: false,\n    bookingDone: false,\n    bookingService: '',\n    quizOpen: false,\n    quizStep: 0,\n    tIndex: 0,\n    subscribed: false,\n  };\n\n  questions = [\n    { q: 'Что сейчас беспокоит вас больше всего?', opts: ['Тревога и постоянное беспокойство', 'Страхи, мешающие действовать', 'Последствия болезненного опыта', 'Хронический стресс и выгорание'] },\n    { q: 'Как давно это длится?', opts: ['Совсем недавно', 'Несколько месяцев', 'Больше года', 'Много лет'] },\n    { q: 'Что вы уже пробовали?', opts: ['Пока ничего — это первый шаг', 'Читала книги и статьи', 'Работала с психологом раньше', 'Разные методики и практики'] },\n    { q: 'Какой формат вам ближе?', opts: ['Разовая сессия для ясности', 'Регулярная поддержка', 'Глубокая длительная работа', 'Пока не знаю'] },\n    { q: 'Когда хотите начать?', opts: ['Как можно скорее', 'В течение недели', 'В этом месяце', 'Пока просто изучаю'] },\n  ];\n\n  componentDidMount() {\n    const reveal = this.props.revealAnimations ?? true;\n    const els = document.querySelectorAll('[data-reveal]');\n    if (!reveal) {\n      els.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; });\n    } else if ('IntersectionObserver' in window) {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) { e.target.style.opacity = '1'; e.target.style.transform = 'none'; io.unobserve(e.target); }\n        });\n      }, { threshold: 0.12 });\n      els.forEach((el) => io.observe(el));\n    } else {\n      els.forEach((el) => { el.style.opacity = '1'; el.style.transform = 'none'; });\n    }\n    if (this.props.autoQuiz ?? true) {\n      this._timer = setTimeout(() => {\n        if (!this.state.quizOpen && !this.state.modalOpen) this.setState({ quizOpen: true, quizStep: 0 });\n      }, 30000);\n    }\n  }\n\n  componentWillUnmount() { clearTimeout(this._timer); }\n\n  open(service) {\n    this.setState({ modalOpen: true, bookingDone: false, bookingService: service || this.state.bookingService });\n  }\n\n  renderVals() {\n    const s = this.state;\n    const total = this.questions.length;\n    const isResult = s.quizStep >= total;\n    const q = isResult ? null : this.questions[s.quizStep];\n    const peach = '#E8A87C';\n    const idle = '#d8cdba';\n\n    return {\n      // booking modal\n      modalOpen: s.modalOpen,\n      bookingDone: s.bookingDone,\n      showBookingForm: s.modalOpen && !s.bookingDone,\n      bookingService: s.bookingService,\n      openModal: () => this.open(''),\n      bookFirst: () => this.open('Первая сессия'),\n      bookMonth: () => this.open('Месяц поддержки'),\n      bookDeep: () => this.open('Глубинная работа'),\n      closeModal: () => this.setState({ modalOpen: false }),\n      setService: (e) => this.setState({ bookingService: e.target.value }),\n      submitBooking: (e) => { e.preventDefault(); this.setState({ bookingDone: true }); },\n      stop: (e) => e.stopPropagation(),\n\n      // subscribe\n      subscribed: s.subscribed,\n      submitSubscribe: (e) => { e.preventDefault(); this.setState({ subscribed: true }); },\n\n      // testimonials\n      trackTransform: `translateX(-${s.tIndex * 100}%)`,\n      nextT: () => this.setState((st) => ({ tIndex: (st.tIndex + 1) % 3 })),\n      prevT: () => this.setState((st) => ({ tIndex: (st.tIndex + 2) % 3 })),\n      dots: [0, 1, 2].map((i) => ({ bg: i === s.tIndex ? peach : idle, onClick: () => this.setState({ tIndex: i }) })),\n\n      // quiz\n      quizOpen: s.quizOpen,\n      quizIsResult: isResult,\n      showQuizQuestion: s.quizOpen && !isResult,\n      quizQuestion: q ? q.q : '',\n      quizStepNum: Math.min(s.quizStep + 1, total),\n      quizTotal: total,\n      quizProgress: `${Math.round((Math.min(s.quizStep, total) / total) * 100)}%`,\n      quizOptions: q ? q.opts.map((o) => ({ label: o, onClick: () => this.setState((st) => ({ quizStep: st.quizStep + 1 })) })) : [],\n      quizResultTitle: 'Вам подойдёт «Первая сессия»',\n      quizResultText: 'Судя по ответам, лучший первый шаг — одна встреча, чтобы получить ясность и спокойствие уже сейчас. А дальше вместе выберем глубину и формат работы под ваш запрос.',\n      openQuiz: () => this.setState({ quizOpen: true, quizStep: 0 }),\n      closeQuiz: () => this.setState({ quizOpen: false, quizStep: 0 }),\n      restartQuiz: () => this.setState({ quizStep: 0 }),\n      bookFromQuiz: () => this.setState({ quizOpen: false, modalOpen: true, bookingDone: false, bookingService: 'Первая сессия' }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
