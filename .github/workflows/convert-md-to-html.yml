name: Convert Markdown to HTML

on:
  push:
    paths:
      - 'blog/*.md'
    branches: [main]

  # Ручной запуск (на всякий случай)
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g markdown-it

      - name: Convert MD to HTML
        run: |
          mkdir -p blog

          for file in blog/*.md; do
            [ -e "$file" ] || continue

            filename=$(basename "$file" .md)

            # Извлекаем title из frontmatter
            title=$(grep -m1 "^title:" "$file" | sed 's/title: //' | sed 's/^"//;s/"$//' | sed "s/^'//;s/'$//" | xargs)
            [ -z "$title" ] && title="Статья"

            # Извлекаем date из frontmatter
            date_str=$(grep -m1 "^date:" "$file" | sed 's/date: //' | xargs)
            [ -z "$date_str" ] && date_str=$(date +%Y-%m-%d)

            # Форматируем дату для отображения (2026-07-12 → 12 июля 2026)
            day=$(echo "$date_str" | cut -d'-' -f3)
            month_num=$(echo "$date_str" | cut -d'-' -f2)
            year=$(echo "$date_str" | cut -d'-' -f1)

            case "$month_num" in
              01) month="января";;
              02) month="февраля";;
              03) month="марта";;
              04) month="апреля";;
              05) month="мая";;
              06) month="июня";;
              07) month="июля";;
              08) month="августа";;
              09) month="сентября";;
              10) month="октября";;
              11) month="ноября";;
              12) month="декабря";;
              *) month="месяца";;
            esac

            display_date="${day} ${month} ${year}"

            # Извлекаем контент (после frontmatter --- ... ---)
            content=$(sed '1{/^---$/!q};1,/^---$/d' "$file")

            # Конвертируем Markdown в HTML
            html_content=$(echo "$content" | npx markdown-it)

            # Создаем HTML файл с полным шаблоном сайта
            cat > "blog/${filename}.html" << 'HTMLEOF'
