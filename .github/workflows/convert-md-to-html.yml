name: Convert Markdown to HTML

on:
  push:
    paths:
      - 'blog/*.md'
    branches: [main]

  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install markdown-it

      - name: Create and run converter
        run: |
          echo "" | base64 -d > convert.js
          node convert.js
          rm convert.js

      - name: Commit and push HTML files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add blog/*.html
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "🤖 Auto-convert Markdown to HTML [skip ci]"
            git push
          fi
