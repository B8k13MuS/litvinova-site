HTMLEOF

            # Заменяем плейсхолдеры
            sed -i "s/TITLE_PLACEHOLDER/${title}/g" "blog/${filename}.html"
            sed -i "s/DATE_PLACEHOLDER/${display_date}/g" "blog/${filename}.html"

            # Заменяем CONTENT_PLACEHOLDER на реальный HTML-контент
            # Используем awk для безопасной замены многострочного контента
            awk -v content="${html_content}" '
            /CONTENT_PLACEHOLDER/ {
                print content
                next
            }
            { print }
            ' "blog/${filename}.html" > "blog/${filename}.html.tmp" && mv "blog/${filename}.html.tmp" "blog/${filename}.html"

            echo "✅ Сконвертировано: $file → blog/${filename}.html"
          done

      - name: Commit and push HTML files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          git add blog/*.html

          if git diff --cached --quiet; then
            echo "Нет изменений для коммита"
          else
            git commit -m "🤖 Автоконвертация Markdown → HTML [skip ci]"
            git push
          fi
