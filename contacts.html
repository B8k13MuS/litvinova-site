<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-content="seo_title">Контакты | Психолог Надежда Литвинова</title>
    <meta name="description" data-content="seo_description" content="Запишитесь на консультацию онлайн или свяжитесь через Telegram.">
    
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <a href="index.html" class="logo">Надежда Литвинова</a>
            <nav class="main-nav">
                <a href="index.html">Главная</a>
                <a href="about.html">Обо мне</a>
                <a href="services.html">Услуги</a>
                <a href="contacts.html">Контакты</a>
                <a href="blog.html">Блог</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact-hero">
            <div class="container">
                <h1 data-content="contact_title">Запишитесь на консультацию</h1>
                <p data-content="contact_subtitle">Оставьте заявку, и я свяжусь с вами в течение 24 часов.</p>
            </div>
        </section>

        <section class="contact-details">
            <div class="container">
                <div class="contact-info" data-content="contact_info_items"></div>
                
                <form class="contact-form" id="contactForm">
                    <h3>Отправить заявку</h3>
                    <label>
                        Ваше имя *
                        <input type="text" name="name" required placeholder="Пожалуйста, введите имя">
                    </label>
                    <label>
                        Телефон *
                        <input type="tel" name="phone" required placeholder="Пожалуйста, введите телефон">
                    </label>
                    <label>
                        Email
                        <input type="email" name="email" placeholder="Введите корректный email">
                    </label>
                    <label>
                        Предпочтительный формат
                        <select name="format">
                            <option value="online">Онлайн (Zoom/Skype)</option>
                            <option value="any">Любой</option>
                        </select>
                    </label>
                    <label>
                        Опишите ваш запрос
                        <textarea name="message" rows="4"></textarea>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="consent" required>
                        Я согласен(а) на обработку персональных данных
                    </label>
                    <button type="submit" class="btn btn-primary">Отправить заявку</button>
                    <p class="form-note">Данные конфиденциальны и не передаются третьим лицам.</p>
                </form>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Надежда Литвинова. Все права защищены.</p>
        </div>
    </footer>

    <script src="content-loader.js"></script>
</body>
</html>
